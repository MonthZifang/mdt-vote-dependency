plugin.name=mdt-vote-dependency
plugin.displayName=MDT Vote Dependency
plugin.version=v1

vote.defaultDurationSeconds=30
vote.defaultPassRatio=0.6
vote.minimumYesVotes=2
vote.renderIntervalSeconds=3
vote.defaultAllowTargetVote=false

render.windowWidth=460
render.windowHeight=220
render.playerScreenX=0
render.playerScreenY=0
render.mapX=0
render.mapY=0

redirect.host=127.0.0.1
redirect.port=6567
redirect.name=Target Server
redirect.uriTemplate=mdt://jump?host=%s&port=%s&name=%s
redirect.sendChat=true
redirect.sendInfo=true
redirect.kick=false
redirect.kickDuration=60000
redirect.chatTemplate=[accent][Vote][] Please jump to: %s
redirect.infoTemplate=[accent][Vote Passed][] Jump target: %s
redirect.kickTemplate=%s
